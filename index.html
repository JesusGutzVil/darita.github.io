<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synchronized</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #fff5f7 0%, #ffe8ef 50%, #ffddee 100%);
      height: 100vh;
      padding: 0;
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 14px 40px;
      box-shadow: 0 4px 30px rgba(255, 20, 147, 0.08);
      border-bottom: 1px solid rgba(255, 105, 180, 0.15);
      animation: headerSlideDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(-100%);
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ff1493 0%, #e91e8c 40%, #ff69b4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      text-align: center;
    }

    /* ===== LAYOUT ===== */
    .container {
      width: 100%;
      height: calc(100vh - 52px);
      padding: 15px;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      height: 100%;
    }

    /* ===== ZONA 1: Imágenes directas ===== */
    .zone-1 {
      border-radius: 15px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 25px 60px -12px rgba(255, 20, 147, 0.2),
        0 0 0 1px rgba(255, 105, 180, 0.15);
      animation: zoneSlideIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      opacity: 0;
      transform: translateX(-60px) scale(0.95);
      background: linear-gradient(135deg, #ffe0e6 0%, #fff5f7 50%, #fce4ec 100%);
    }

    .image-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: scale(1.05);
      transition: opacity 1s ease, transform 1.4s ease;
    }

    .image-slide.active {
      opacity: 1;
      transform: scale(1);
    }

    .image-slide.exit {
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 0.8s ease;
    }

    .image-slide.no-image {
      font-size: 5rem;
      background: linear-gradient(135deg, #ffe0e6 0%, #fff5f7 50%, #fce4ec 100%);
    }

    /* ===== ZONA 2: Letras flotantes ===== */
    .zone-2 {
      border-radius: 15px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: zoneSlideInRight 1s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards;
      opacity: 0;
      transform: translateX(60px) scale(0.95);
      background: linear-gradient(160deg, #1a0a12 0%, #2d0f1e 30%, #1f0815 60%, #120610 100%);
      box-shadow:
        0 25px 60px -12px rgba(255, 20, 147, 0.2),
        0 0 0 1px rgba(255, 105, 180, 0.15);
    }

    /* Fondo sutil de la zona 2 */
    .zone-2::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 20, 147, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 105, 180, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(219, 39, 119, 0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .floating-hearts {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .floating-heart {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0;
      animation: floatHeart linear infinite;
      filter: blur(0.5px);
    }

    @keyframes floatHeart {
      0% {
        opacity: 0;
        transform: translateY(100%) rotate(0deg) scale(0.5);
      }
      10% {
        opacity: 0.3;
      }
      50% {
        opacity: 0.15;
      }
      90% {
        opacity: 0.05;
      }
      100% {
        opacity: 0;
        transform: translateY(-120%) rotate(360deg) scale(1.2);
      }
    }

    /* Intro section */
    .intro-section {
      text-align: center;
      z-index: 2;
      position: relative;
      padding: 40px;
      animation: introFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    .intro-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ff69b4 0%, #ff1493 50%, #ff85c8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
      letter-spacing: -0.5px;
    }

    .intro-text {
      color: rgba(255, 182, 213, 0.7);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 35px;
      font-weight: 300;
    }

    .start-btn {
      width: 100%;
      max-width: 280px;
      padding: 18px 36px;
      border: none;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #ff1493 0%, #e91e8c 50%, #ff69b4 100%);
      color: white;
      box-shadow:
        0 15px 40px -8px rgba(255, 20, 147, 0.5),
        0 0 20px rgba(255, 20, 147, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .start-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .start-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 20px 50px -8px rgba(255, 20, 147, 0.6),
        0 0 30px rgba(255, 20, 147, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .start-btn:hover::after {
      left: 100%;
    }

    .start-btn:active {
      transform: translateY(-1px) scale(0.98);
    }

    /* ===== LETRAS FLOTANTES ===== */
    .lyric-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 30px;
    }

    .lyric-line {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: transparent;
      line-height: 1.5;
      text-align: center;
      position: absolute;
      margin: 6px 0;
      opacity: 0;
      transform: translateY(25px) translateZ(0);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      /* Floating depth effect */
      background: linear-gradient(180deg, #ffffff 0%, #ffcce0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      filter: drop-shadow(0 2px 15px rgba(255, 20, 147, 0.4)) drop-shadow(0 0 40px rgba(255, 105, 180, 0.15));
      max-width: 85%;
    }

    .lyric-line.visible {
      opacity: 1;
      transform: translateY(0) translateZ(0);
    }

    .lyric-line.exit {
      opacity: 0;
      transform: translateY(-20px) translateZ(0);
      transition: opacity 0.6s cubic-bezier(0.4, 0, 1, 1), transform 0.6s cubic-bezier(0.4, 0, 1, 1);
    }

    /* ===== KEYFRAMES ===== */
    @keyframes headerSlideDown {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes zoneSlideIn {
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes zoneSlideInRight {
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes introFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>✨ Título de tu experiencia ✨</h1>
  </div>

  <div class="container">
    <div class="content">
      <!-- Audio sincronizado -->
      <audio id="audioPlayer" preload="auto" src="TeQuieroMuchoMucho-RioRoma.m4a"></audio>

      <!-- ZONA 1: Imágenes directas, sin contenedor interno -->
      <div class="zone-1">
        <div class="image-slide active" style="background-image: url('img/nos1.jpg');"></div>
      </div>

      <!-- ZONA 2: Letras flotantes con profundidad -->
      <div class="zone-2" id="zone2">
        <!-- Corazones flotantes de fondo -->
        <div class="floating-hearts" id="floatingHearts"></div>

        <div class="intro-section" id="introSection">
          <h2 class="intro-title">Título aquí</h2>
          <p class="intro-text">Descripción aquí</p>
          <button class="start-btn" onclick="startShow()">▶ Iniciar</button>
        </div>

        <div class="lyric-wrapper" id="lyricWrapper" style="display: none;"></div>
      </div>
    </div>
  </div>

  <script>
    // ===== CONFIGURACIÓN =====
    // img: ['ruta', tiempoInicio, tiempoFin]
    const imagesTimeline = [
      { src: 'img/nos1.jpg', start: 0, end: 12000 },
      { src: 'img/nos2.jpg', start: 12000, end: 24000 },
      { src: 'img/dalita.jpg', start: 24000, end: 36000 },
      { src: 'img/nos3.jpg', start: 36000, end: 48000 },
      { src: 'img/amolshita.jpg', start: 48000, end: 60000 },
      { src: 'img/nos4.jpg', start: 60000, end: 72000 },
      { src: 'img/dalitapiquiña.jpg', start: 72000, end: 84000 },
      { src: 'img/nos5.jpg', start: 84000, end: 96000 },
      { src: 'img/nos6.jpg', start: 96000, end: 108000 },
      { src: 'img/nos7.jpg', start: 108000, end: 130000 },
    ];

    // letra: ['texto', tiempoIn, tiempoOut]
    const lyricTimeline = [
      // Verso 1
      { text: 'Ya sé que no hay reglas', start: 1000, end: 4000 },
      { text: 'Ni en el amor, ni en la amistad', start: 4500, end: 8000 },
      { text: 'Lo que es muy importante', start: 8500, end: 12000 },
      { text: 'Es hablarse con honestidad', start: 12500, end: 16000 },
      { text: 'Por eso hoy te traigo', start: 16500, end: 19500 },
      { text: 'Unas palabras que regalarte', start: 20000, end: 23500 },
      { text: 'No soy ningún poeta', start: 24000, end: 27000 },
      { text: 'Ni busco impresionarte', start: 27500, end: 31000 },
      // Coro 1
      { text: 'Es que me gustas tú', start: 31500, end: 34500 },
      { text: 'Me haces feliz en un segundo', start: 35000, end: 38500 },
      { text: 'No sé si sea tu luz', start: 39000, end: 42000 },
      { text: 'Pero te veo y me quedo mudo', start: 42500, end: 46000 },
      { text: 'Oh, baby, I love you', start: 46500, end: 49500 },
      { text: 'Yo quiero que te quedes en mi mundo', start: 50000, end: 54000 },
      { text: 'Y quiero confesarte que', start: 54500, end: 57500 },
      { text: 'Aunque te conozco poco', start: 58000, end: 61000 },
      { text: 'Ya te quiero mucho', start: 61500, end: 64000 },
      { text: '¡Mucho, mucho, mucho!', start: 64500, end: 68000 },
      // Verso 2
      { text: 'No vayas a pensar', start: 69000, end: 72000 },
      { text: 'Que es una declaración casual', start: 72500, end: 76000 },
      { text: 'No busco una respuesta', start: 76500, end: 79500 },
      { text: 'Busco que tú sepas, nada más', start: 80000, end: 84000 },
      // Coro 2
      { text: 'Que me gustas tú', start: 84500, end: 87000 },
      { text: 'Me haces feliz en un segundo', start: 87500, end: 91000 },
      { text: 'No sé si sea tu luz', start: 91500, end: 94500 },
      { text: 'Pero te veo y me quedo mudo', start: 95000, end: 98500 },
      { text: 'Oh, baby, I love you', start: 99000, end: 102000 },
      { text: 'Yo quiero que te quedes en mi mundo', start: 102500, end: 106000 },
      { text: 'Y quiero confesarte que', start: 106500, end: 109000 },
      { text: 'Aunque te conozco poco', start: 109500, end: 112500 },
      // Puente
      { text: 'Ya sé que tal vez te sorprenda', start: 113000, end: 116500 },
      { text: 'Mi sinceridad', start: 117000, end: 120000 },
      { text: 'Pero no hay nada de malo', start: 120500, end: 124000 },
      { text: 'En decirte la verdad', start: 124500, end: 128000 },
      // Coro final
      { text: 'Y es que me gustas tú', start: 128500, end: 131500 },
      { text: 'Me haces feliz en un segundo', start: 132000, end: 135500 },
      { text: 'No sé si sea tu luz', start: 136000, end: 139000 },
      { text: 'Pero te veo y me quedo mudo', start: 139500, end: 143000 },
      { text: 'Oh, baby, I love you', start: 143500, end: 146500 },
      { text: 'Yo quiero que te quedes en mi mundo', start: 147000, end: 151000 },
      { text: 'Y quiero confesarte que', start: 151500, end: 154500 },
      { text: 'Aunque te conozco poco', start: 155000, end: 158000 },
      { text: 'Ya te quiero mucho', start: 158500, end: 161500 },
      { text: '¡Mucho, mucho, mucho!', start: 162000, end: 165000 },
      { text: '¡Pero mucho, mucho, mucho!', start: 165500, end: 170000 },
    ];

    let isPlaying = false;
    let startTime = 0;
    let pausedTime = 0;
    let animationFrameId = null;
    let currentImageIndex = -1;
    let currentLyricIndex = -1;
    let currentSlide = null;
    let currentLyricEl = null;

    // ===== CORAZONES FLOTANTES =====
    function createFloatingHearts() {
      const container = document.getElementById('floatingHearts');
      const hearts = ['❤', '💕', '🌹', '💗', '♥', '🩷', '💖'];

      for (let i = 0; i < 20; i++) {
        const heart = document.createElement('span');
        heart.className = 'floating-heart';
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.fontSize = (0.6 + Math.random() * 1.2) + 'rem';
        heart.style.animationDuration = (8 + Math.random() * 12) + 's';
        heart.style.animationDelay = (Math.random() * 15) + 's';
        container.appendChild(heart);
      }
    }

    createFloatingHearts();

    // ===== ACTUALIZACIÓN =====
    function updateShow(currentTimeMs) {
      updateImage(currentTimeMs);
      updateLyric(currentTimeMs);
    }

    function updateImage(currentTimeMs) {
      // Buscar qué imagen corresponde al tiempo actual
      let newIndex = -1;
      for (let i = 0; i < imagesTimeline.length; i++) {
        const img = imagesTimeline[i];
        if (currentTimeMs >= img.start && currentTimeMs < img.end) {
          newIndex = i;
          break;
        }
      }

      if (newIndex !== currentImageIndex) {
        const container = document.querySelector('.zone-1');

        // Animar salida de la imagen actual
        if (currentSlide) {
          const oldSlide = currentSlide;
          oldSlide.classList.remove('active');
          oldSlide.classList.add('exit');
          setTimeout(() => {
            if (oldSlide.parentNode) oldSlide.parentNode.removeChild(oldSlide);
          }, 900);
        }

        currentImageIndex = newIndex;

        if (newIndex >= 0) {
          const newSlide = createImageSlide(imagesTimeline[newIndex].src);
          container.appendChild(newSlide);

          // Forzar reflow y animar entrada
          newSlide.offsetHeight;
          requestAnimationFrame(() => {
            newSlide.classList.add('active');
          });

          currentSlide = newSlide;
        } else {
          currentSlide = null;
        }
      }
    }

    function createImageSlide(src) {
      const slide = document.createElement('div');
      slide.className = 'image-slide';

      if (src.includes('/') || src.includes('.')) {
        slide.style.backgroundImage = `url('${src}')`;
      } else {
        slide.classList.add('no-image');
        slide.textContent = src;
      }

      return slide;
    }

    function updateLyric(currentTimeMs) {
      // Buscar qué lyric corresponde al tiempo actual
      let newIndex = -1;
      for (let i = 0; i < lyricTimeline.length; i++) {
        const lyric = lyricTimeline[i];
        if (currentTimeMs >= lyric.start && currentTimeMs <= lyric.end) {
          newIndex = i;
          break;
        }
      }

      // Solo actuar si cambió el índice
      if (newIndex !== currentLyricIndex) {
        const wrapper = document.getElementById('lyricWrapper');

        // Si había un lyric visible, animarlo para salir
        if (currentLyricEl) {
          const oldEl = currentLyricEl;
          oldEl.classList.remove('visible');
          oldEl.classList.add('exit');
          setTimeout(() => {
            if (oldEl.parentNode) oldEl.parentNode.removeChild(oldEl);
          }, 650);
        }

        currentLyricIndex = newIndex;

        // Si hay un nuevo lyric, mostrarlo
        if (newIndex >= 0) {
          const lyricData = lyricTimeline[newIndex];
          const lyricEl = document.createElement('div');
          lyricEl.className = 'lyric-line';
          lyricEl.textContent = lyricData.text;

          wrapper.appendChild(lyricEl);

          // Forzar reflow y animar entrada
          lyricEl.offsetHeight;
          requestAnimationFrame(() => {
            lyricEl.classList.add('visible');
          });

          currentLyricEl = lyricEl;
        } else {
          currentLyricEl = null;
        }
      }
    }

    function startShow() {
      isPlaying = true;
      startTime = Date.now();
      pausedTime = 0;

      // Reproducir audio
      const audio = document.getElementById('audioPlayer');
      audio.currentTime = 0;
      audio.play();

      const introSection = document.getElementById('introSection');
      introSection.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      introSection.style.opacity = '0';
      introSection.style.transform = 'translateY(-20px)';

      setTimeout(() => {
        introSection.style.display = 'none';
        document.getElementById('lyricWrapper').style.display = 'flex';
      }, 600);

      updateShow(0);
      animationLoop();
    }

    function animationLoop() {
      if (isPlaying) {
        const elapsedMs = Date.now() - startTime + pausedTime;
        updateShow(elapsedMs);

        // Detener si ya pasó la última lyric y la última imagen
        const lastLyricEnd = lyricTimeline[lyricTimeline.length - 1].end;
        const lastImageEnd = imagesTimeline[imagesTimeline.length - 1].end;
        const maxTime = Math.max(lastLyricEnd, lastImageEnd);

        if (elapsedMs > maxTime + 2000) {
          isPlaying = false;
          document.getElementById('audioPlayer').pause();
          return;
        }

        animationFrameId = requestAnimationFrame(animationLoop);
      }
    }

    // Mostrar primera imagen placeholder
    const container = document.querySelector('.zone-1');
    const initialSlide = document.querySelector('.image-slide');
    currentSlide = initialSlide;
  </script>
</body>
</html>
