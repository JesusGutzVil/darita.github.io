<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7 Meses</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      /* Fondo general oscuro/romántico para que todo flote sin separaciones */
      background: linear-gradient(135deg, #1a0a12 0%, #2d0f1e 40%, #1f0815 100%);
      height: 100vh;
      padding: 0;
      overflow: hidden;
      color: #fff;
    }

    /* Fondo sutil global con destellos */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 20, 147, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 105, 180, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(219, 39, 119, 0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== LAYOUT ===== */
    .container {
      width: 100%;
      height: 100vh;
      padding: 20px 40px;
      position: relative;
      z-index: 1;
    }

    .content {
      display: grid;
      grid-template-columns: 4fr 6fr; /* Modificado: 40% imágenes, 60% texto para dar más espacio a la letra */
      gap: 40px;
      height: 100%;
    }

    /* ===== ZONA 1: Imágenes con perspectiva 3D ===== */
    .zone-1 {
      border-radius: 15px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 30px 60px -15px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 105, 180, 0.15);
      animation: zoneSlideIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      opacity: 0;
      transform-style: preserve-3d;
      /* Estado inicial de la animación */
      transform: perspective(1200px) rotateY(12deg) rotateX(4deg) translateX(-60px) scale(0.95);
      background: rgba(0,0,0,0.2);
    }

    .image-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: scale(1.05);
      transition: opacity 1s ease, transform 1.4s ease;
    }

    .image-slide.active {
      opacity: 1;
      transform: scale(1);
    }

    .image-slide.exit {
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 0.8s ease;
    }

    .image-slide.no-image {
      font-size: 5rem;
      background: rgba(255, 255, 255, 0.05);
    }

    /* ===== ZONA 2: Letras flotantes (Sin contenedor) ===== */
    .zone-2 {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: zoneSlideInRight 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards;
      opacity: 0;
      transform: translateX(60px) scale(0.95);
    }

    /* ===== CORAZONES FLOTANTES ===== */
    .floating-hearts {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .floating-heart {
      position: absolute;
      bottom: -40px; /* Inician desde abajo del contenedor */
      opacity: 0;
      animation: floatHeart linear infinite;
      filter: blur(0.5px);
    }

    @keyframes floatHeart {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.5);
      }
      20% {
        opacity: 0.6; /* Entran con degradado subiendo opacidad */
      }
      80% {
        opacity: 0.6;
      }
      100% {
        opacity: 0;
        transform: translateY(-80vh) scale(1.2); /* Flotan hacia arriba */
      }
    }

    /* ===== INTRO SECTION ===== */
    .intro-section {
      text-align: center;
      z-index: 3;
      position: relative;
      padding: 40px;
      animation: introFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    .intro-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ffb6c1 0%, #ff69b4 50%, #ff1493 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
      letter-spacing: -0.5px;
    }

    .intro-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 35px;
      font-weight: 300;
      text-align: justify;
    }

    .start-btn {
      width: 100%;
      max-width: 280px;
      padding: 18px 36px;
      border: none;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #ff1493 0%, #e91e8c 50%, #ff69b4 100%);
      color: white;
      box-shadow:
        0 15px 40px -8px rgba(255, 20, 147, 0.5),
        0 0 20px rgba(255, 20, 147, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .start-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .start-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 20px 50px -8px rgba(255, 20, 147, 0.6),
        0 0 30px rgba(255, 20, 147, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .start-btn:hover::after {
      left: 100%;
    }

    .start-btn:active {
      transform: translateY(-1px) scale(0.98);
    }

    /* ===== LETRAS ESTILO SPOTIFY ===== */
    .lyric-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: 0 20px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease 0.3s;
      /* Máscara de desvanecido arriba y abajo */
      mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
    }

    .lyric-wrapper.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .lyric-scroll-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      /* Transición suave para el efecto de scroll */
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      transform: translateY(0);
      /* Padding para permitir centrar la primera y última línea */
      padding: 50vh 0; 
    }

    .lyric-line {
      font-family: 'Montserrat', sans-serif;
      text-align: center;
      line-height: 1.4;
      max-width: 95%;
      padding: 15px 0;
      font-size: 1.25rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.3); /* Letras inactivas más oscuras */
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      transform: scale(0.9);
      cursor: default;
    }

    .lyric-line.active {
      font-size: 2.1rem; /* Letra actual brillante y grande */
      background: linear-gradient(180deg, #ffffff 0%, #ffcce0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 2px 15px rgba(255, 20, 147, 0.5)) drop-shadow(0 0 40px rgba(255, 105, 180, 0.2));
      transform: scale(1);
      opacity: 1;
    }

    .lyric-line.passed {
      opacity: 0.15; /* Letras que ya pasaron son aún más tenues */
      transform: scale(0.85);
    }

    /* ===== KEYFRAMES ===== */
    @keyframes headerSlideDown {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes zoneSlideIn {
      to {
        opacity: 1;
        /* Gira un poco hacia la izquierda, dando perspectiva 3D */
        transform: perspective(1200px) rotateY(12deg) rotateX(4deg) translateX(0) scale(1);
      }
    }

    @keyframes zoneSlideInRight {
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes introFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

      { text: 'No sé si sea tu luz', start: 91500, end: 94500 },
      { text: 'Pero te veo y me quedo mudo', start: 95000, end: 98500 },
      { text: 'Oh, baby, I love you', start: 99000, end: 102000 },
      { text: 'Yo quiero que te quedes en mi mundo', start: 102500, end: 106000 },
      { text: 'Y quiero confesarte que', start: 106500, end: 109000 },
      { text: 'Aunque te conozco poco', start: 109500, end: 112500 },

      { text: 'Ya sé que tal vez te sorprenda', start: 113000, end: 116500 },

      { text: 'Y es que me gustas tú', start: 128500, end: 131500 },
      { text: 'Me haces feliz en un segundo', start: 132000, end: 135500 },
      { text: 'No sé si sea tu luz', start: 136000, end: 139000 },
      { text: 'Pero te veo y me quedo mudo', start: 139500, end: 143000 },
      { text: 'Oh, baby, I love you', start: 143500, end: 146500 },
      { text: 'Yo quiero que te quedes en mi mundo', start: 147000, end: 151000 },
      { text: 'Y quiero confesarte que', start: 151500, end: 154500 },
      { text: 'Aunque te conozco poco', start: 155000, end: 158000 },
      { text: 'Ya te quiero mucho', start: 158500, end: 161500 },
      { text: '¡Mucho, mucho, mucho!', start: 162000, end: 165000 },
      { text: '¡Pero mucho, mucho, mucho!', start: 165500, end: 170000 },
    ];

    let isPlaying = false;
    let startTime = 0;
    let pausedTime = 0;
    let animationFrameId = null;
    let currentImageIndex = -1;
    let currentLyricIndex = -1;
    let currentSlide = null;

    // ===== CORAZONES FLOTANTES =====
    function createFloatingHearts() {
      const container = document.getElementById('floatingHearts');
      const hearts = ['❤', '💕', '🌹', '💗', '♥', '🩷', '💖'];

      for (let i = 0; i < 20; i++) {
        const heart = document.createElement('span');
        heart.className = 'floating-heart';
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
        heart.style.animationDuration = (8 + Math.random() * 10) + 's';
        heart.style.animationDelay = (Math.random() * 8) + 's';
        container.appendChild(heart);
      }
    }

    createFloatingHearts();

    // ===== INICIALIZAR LETRAS =====
    const scrollContainer = document.getElementById('lyricScroll');
    lyricTimeline.forEach((lyric, index) => {
      const el = document.createElement('div');
      el.className = 'lyric-line';
      el.textContent = lyric.text;
      el.id = `lyric-${index}`;
      scrollContainer.appendChild(el);
    });

    // ===== ACTUALIZACIÓN =====
    function updateShow(currentTimeMs) {
      updateImage(currentTimeMs);
      updateLyric(currentTimeMs);
    }

    function updateImage(currentTimeMs) {
      let newIndex = -1;
      for (let i = 0; i < imagesTimeline.length; i++) {
        const img = imagesTimeline[i];
        if (currentTimeMs >= img.start && currentTimeMs < img.end) {
          newIndex = i;
          break;
        }
      }

      if (newIndex !== currentImageIndex) {
        const container = document.querySelector('.zone-1');

        if (currentSlide) {
          const oldSlide = currentSlide;
          oldSlide.classList.remove('active');
          oldSlide.classList.add('exit');
          setTimeout(() => {
            if (oldSlide.parentNode) oldSlide.parentNode.removeChild(oldSlide);
          }, 900);
        }

        currentImageIndex = newIndex;

        if (newIndex >= 0) {
          const newSlide = createImageSlide(imagesTimeline[newIndex].src);
          container.appendChild(newSlide);

          newSlide.offsetHeight;
          requestAnimationFrame(() => {
            newSlide.classList.add('active');
          });

          currentSlide = newSlide;
        } else {
          currentSlide = null;
        }
      }
    }

    function createImageSlide(src) {
      const slide = document.createElement('div');
      slide.className = 'image-slide';

      if (src.includes('/') || src.includes('.')) {
        const videoExtensions = ['.mp4', '.webm', '.ogg', '.mov'];
        const isVideo = videoExtensions.some(ext => src.toLowerCase().endsWith(ext));

        if (isVideo) {
          const video = document.createElement('video');
          video.src = src;
          video.autoplay = true;
          video.loop = true;
          video.muted = true;
          video.playsInline = true;
          // Estilos para que el video cubra el div como si fuera background-size: cover
          video.style.position = 'absolute';
          video.style.top = '0';
          video.style.left = '0';
          video.style.width = '100%';
          video.style.height = '100%';
          video.style.objectFit = 'cover';
          video.style.zIndex = '-1';
          slide.appendChild(video);
        } else {
          slide.style.backgroundImage = `url('${src}')`;
        }
      } else {
        slide.classList.add('no-image');
        slide.textContent = src;
      }

      return slide;
    }

    function updateLyric(currentTimeMs) {
      let newIndex = -1;
      for (let i = 0; i < lyricTimeline.length; i++) {
        if (currentTimeMs >= lyricTimeline[i].start) {
          newIndex = i;
        } else {
          break;
        }
      }

      if (newIndex !== currentLyricIndex) {
        currentLyricIndex = newIndex;
        
        // Actualizar clases de las letras
        const allLines = document.querySelectorAll('.lyric-line');
        allLines.forEach((el, idx) => {
          if (idx === newIndex) {
            el.classList.add('active');
            el.classList.remove('passed');
          } else if (idx < newIndex) {
            el.classList.remove('active');
            el.classList.add('passed');
          } else {
            el.classList.remove('active');
            el.classList.remove('passed');
          }
        });

        // Hacer Scroll Suave (estilo Spotify)
        const wrapper = document.getElementById('lyricWrapper');
        const scrollContainer = document.getElementById('lyricScroll');
        
        if (newIndex >= 0) {
          const activeEl = document.getElementById(`lyric-${newIndex}`);
          if (activeEl) {
            const wrapperHeight = wrapper.offsetHeight;
            const elOffsetTop = activeEl.offsetTop;
            const elHeight = activeEl.offsetHeight;
            
            // Calcular translateY para centrar el elemento activo en el wrapper
            const translateY = (wrapperHeight / 2) - (elOffsetTop + elHeight / 2);
            scrollContainer.style.transform = `translateY(${translateY}px)`;
          }
        } else {
          // Si estamos antes de la primera letra, posicionar al inicio suavemente
          const firstEl = document.getElementById(`lyric-0`);
          if (firstEl) {
            const wrapperHeight = wrapper.offsetHeight;
            const translateY = (wrapperHeight / 2) - (firstEl.offsetTop - 60);
            scrollContainer.style.transform = `translateY(${translateY}px)`;
          }
        }
      }
    }

    function startShow() {
      isPlaying = true;
      startTime = Date.now();
      pausedTime = 0;

      const audio = document.getElementById('audioPlayer');
      audio.currentTime = 0;
      audio.play();

      const introSection = document.getElementById('introSection');
      introSection.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      introSection.style.opacity = '0';
      introSection.style.transform = 'translateY(-20px)';

      document.getElementById('lyricWrapper').classList.add('visible');

      setTimeout(() => {
        introSection.style.display = 'none';
      }, 600);

      updateShow(0);
      animationLoop();
    }

    function animationLoop() {
      if (isPlaying) {
        const elapsedMs = Date.now() - startTime + pausedTime;
        updateShow(elapsedMs);

        const lastLyricEnd = lyricTimeline[lyricTimeline.length - 1].end;
        const lastImageEnd = imagesTimeline[imagesTimeline.length - 1].end;
        const maxTime = Math.max(lastLyricEnd, lastImageEnd);

        if (elapsedMs > maxTime + 2000) {
          isPlaying = false;
          document.getElementById('audioPlayer').pause();
          return;
        }

        animationFrameId = requestAnimationFrame(requestAnimationFrame(animationLoop));
      }
    }

    const containerZone1 = document.querySelector('.zone-1');
    const initialSlide = document.querySelector('.image-slide');
    currentSlide = initialSlide;
  </script>

        var style = document.createElement("style");
        style.textContent =
          "@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}";
        document.head.appendChild(style);
        document.body.appendChild(ov);
        requestAnimationFrame(function () {
          ov.style.opacity = "1";
        });
        setTimeout(function () {
          window.location.href = url;
        }, 650);
      }

      function createEdgeHint(position) {
        var hint = document.createElement("div");
        var isBottom = position === "bottom";
        hint.style.cssText = [
          "position:fixed;" + position + ":0;left:0;right:0;z-index:9998;",
          "padding:10px;text-align:center;pointer-events:none;",
          "background:linear-gradient(" +
            (isBottom ? "0" : "180") +
            "deg,rgba(45,15,30,0.95),transparent);",
          "opacity:0;transition:opacity 0.3s;",
          "font-family:'Montserrat',sans-serif;font-size:11px;",
          "letter-spacing:2px;text-transform:uppercase;color:#ff69b4;",
        ].join("");
        hint.textContent = isBottom
          ? "↓ siguiente página"
          : "↑ anterior página";
        document.body.appendChild(hint);
        return hint;
      }
      var bottomHint = createEdgeHint("bottom");
      var topHint = createEdgeHint("top");

      document.addEventListener(
        "touchstart",
        function (e) {
          touchStartY = e.touches[0].clientY;
        },
        { passive: true }
      );

      document.addEventListener(
        "touchmove",
        function (e) {
          var dy = touchStartY - e.touches[0].clientY;
          if (dy > 20 && atBottom()) {
            bottomHint.style.opacity = "1";
            topHint.style.opacity = "0";
          } else if (dy < -20 && atTop()) {
            topHint.style.opacity = "1";
            bottomHint.style.opacity = "0";
          } else {
            bottomHint.style.opacity = "0";
            topHint.style.opacity = "0";
          }
        },
        { passive: true }
      );

      document.addEventListener(
        "touchend",
        function (e) {
          bottomHint.style.opacity = "0";
          topHint.style.opacity = "0";
          var dy = touchStartY - e.changedTouches[0].clientY;
          if (dy > MIN_SWIPE && atBottom()) goToPage(PAGE_NEXT);
          else if (dy < -MIN_SWIPE && atTop()) goToPage(PAGE_PREV);
        },
        { passive: true }
      );
    })();
  </script>
</body>
</html>
